# =============================================================================
# Standard Locomotion: locomotion training on a standard grid of mixed sub-terrains.
# Standard Locomotion: 标准地形运动训练（多种子地形按比例混合）
#
# Based on  Stage1 + extra terms (termination / flat_orientation / feet_stumble).
# 基于 Stage1 + 额外项（termination / flat_orientation / feet_stumble）
# =============================================================================

# === Basic Configuration ===
# === 基础配置 ===
[env]
# Number of parallel environments, valid range: [1, 4096].
# 并行环境数量，合法范围：[1, 4096]
num_envs = 2048

# Max episode duration (seconds).
# 最大 episode 时长（秒）
episode_length_s = 25

[env_conf]
# Random seed.
# 随机种子
seed = 0


# === Terrain Configuration ===
# === 地形配置 ===
[terrain]
# Terrain mode, valid values: "standard" | "track".
# 地形模式，合法值："standard" | "track"
mode = "standard"

# In standard mode, num_rows = number of difficulty tiers (curriculum levels along X),
# valid range [1, 10], recommended 10.
# standard 模式下 num_rows 表示**难度级别数**（沿 X 轴的课程档位），合法范围：[1, 10]，推荐 10
num_rows = 10

# In standard mode, num_cols = parallel plots within the same difficulty tier along Y,
# valid range [1, 40], recommended 20.
# Note: in standard mode num_cols is NOT a difficulty tier, just parallel plots for env distribution.
# standard 模式下 num_cols 表示**同一难度下的并行地块数**（沿 Y 轴），合法范围：[1, 40]，推荐 20
# 注意：standard 模式下 num_cols 不是难度档，而是用于分散大量 env 到不同地块的并行数
num_cols = 20

# Difficulty range [min, max], valid range: [0.0, 1.0].
# 难度范围 [min, max]，合法范围：[0.0, 1.0]
difficulty_range = [0.0, 1.0]

# Whether to enable terrain curriculum (promote/demote difficulty by performance).
# 是否启用地形课程学习（按表现晋级/降级难度）
curriculum = true

# Max init difficulty tier for robot placement, valid range: [0, 9].
# 机器人初始放置的最大难度档，合法范围：[0, 9]
# 提到 2：评测时 L4 楼梯/坡完全不会的根因之一是 1500 step 时大量 env 还卡在 L0~L1。
# command 收紧后晋级会顺畅，但仍然要让一部分 env 起步在中等难度，确保 L3-L4 地形
# 在训练里有足够样本。0 → 2 是较保守的提升，避免 L4 摔死打乱 curriculum。
# Bumped from 0 to 2 so a fraction of envs see mid-tier terrain from the start
# once command-side tracking has been fixed; reduces L4 OOD at eval time.
max_init_terrain_level = 2


# Sub-terrain proportions (all proportions must sum to 1.0).
# Allowed sub-terrains: pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
# 子地形比例（所有 proportion 之和必须 = 1.0）
# 合法子地形：pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
[terrain.standard.pyramid_slope]
proportion = 0.15

[terrain.standard.pyramid_slope_inv]
proportion = 0.2

[terrain.standard.pyramid_stairs]
proportion = 0.25

[terrain.standard.pyramid_stairs_inv]
proportion = 0.3

[terrain.standard.maze]
proportion = 0.1


# === Domain Randomization ===
# === 域随机化 ===
[domain_rand]
# Master switch for domain randomization.
# 域随机化总开关
enable_domain_rand = true

# Whether to randomize ground friction.
# 是否随机化地面摩擦系数
randomize_friction = true

# Friction range [min, max], must be >= 0.
# 摩擦系数采样范围 [min, max]，必须 >= 0
friction_range = [0.3, 1.5]

# Whether to periodically push the robot.
# 是否周期性对机器人施加外部推力
push_robots = true

# Push interval (seconds), must be > 0.
# 推力间隔（秒），必须 > 0
push_interval_s = 15

# Max push velocity in XY plane (m/s), must be >= 0.
# XY 平面最大推力速度 (m/s)，必须 >= 0
max_push_vel_xy = 0.5


# === Observation Noise ===
# === 观测噪声 ===
[noise]
# Whether to add noise to observations.
# 是否在观测中加入噪声
add_noise = true


# === Initial State ===
# === 初始状态 ===
[init_state]
# Robot initial position [x, y, z] (m); z valid range [0.30, 0.60]m, recommended 0.35m.
# 机器人初始位置 [x, y, z] (m)；z 合法范围：[0.30, 0.60]m，推荐 0.35m
pos = [0.0, 0.0, 0.35]


# === Velocity Commands ===
# === 速度命令 ===
# 关键背景：评测端 command 配置由比赛方提供且不可修改，所以**训练端**必须做到：
# (1) 训练分布只覆盖"前进"这一种 cmd，让策略学到"始终往前走"的稳定行为；
# (2) 即使评测时被采到 cmd_x=0 / cmd 反向 / 大幅旋转，策略也以前进作为默认动作。
# 配合 `forward_velocity` 的 unconditional 改造，前进是策略的内生偏好而非 cmd 触发。
# Eval-time command sampling is fixed by the competition organizer; we adapt by
# narrowing the *training* distribution to forward-only commands so the policy's
# default behavior is "always go forward" regardless of eval-time cmd.
[commands]
# resampling_time 拉长到 = episode_length_s，避免 episode 中途换 cmd 引起"走一半挂机"。
# Match resampling to the full episode so cmd never changes mid-episode.
resampling_time = [25.0, 25.0]

[commands.limit]
# Velocity command **hard limits** (curriculum may expand sampling range up to here).
# 速度命令 **采样上限**（硬约束，curriculum 最多扩展到该范围）
# 收紧到 forward-only：lin_vel_x ≥ 0.3 杜绝后退命令；ang_vel_z 上限 0.5 避免训练里
# 出现"原地高速旋转"样本——它会让策略把"转身"当成 cmd-tracking 的合法解，
# 评测时碰到大 yaw cmd 就直接转圈超时。
# Forward-only hard limit: no backward cmd (root cause of "fall on downhill stairs"
# when cmd_x is sampled negative); yaw cap at 0.5 avoids "spin in place" attractor.
lin_vel_x = [0.3, 1.0]
lin_vel_y = [-0.3, 0.3]
ang_vel_z = [-0.5, 0.5]

[commands.ranges]
# Velocity command **initial sampling ranges** (expand towards limit when curriculum is enabled).
# 速度命令 **初始采样范围**（curriculum 开启时会动态扩大到 limit）

# 全程 forward-only：lin_vel_x 起步就在 [0.3, 0.6]，curriculum 会扩到 limit [0.3, 1.0]。
# yaw 范围适度（±0.5）允许地形（坡顶 / 楼梯过渡）下的小幅修正，但不至于让策略学到"长时间转圈"。
# Forward-only throughout the curriculum; yaw range left modest for slope/stair micro-corrections.
lin_vel_x = [0.3, 0.6]
lin_vel_y = [-0.2, 0.2]
ang_vel_yaw = [-0.5, 0.5]


# =====================================================================
# Reward Configuration
# 奖励配置
#
# Each reward term must have a numeric `weight`; parameterized rewards use [rewards.<name>.params].
# 每个奖励项必须包含数值型 weight；带参数的奖励用 [rewards.<name>.params] 配置
# =====================================================================

# --- Positive: velocity tracking ---
# --- 正向：速度跟踪 ---
# NP3O Go2ConstraintHimRoughCfg 中 tracking_lin_vel = 2.0、tracking_ang_vel = 1.0；提权到 NP3O 比例。
# 同时把 std 从 0.25 放宽到 0.5：原值在 cmd=0.25/vx=0 时仅给 ~0.55 满分，梯度过陡，
# agent 在 cmd=0（resampling 起点 [0.0, 0.5] 会采到 0）时反而能"站着拿满分"。
# Match NP3O tracking weights and broaden sigma so partial tracking still yields
# meaningful gradient instead of collapsing to "stand still when cmd≈0".
[rewards.track_lin_vel_xy]
# 权重从 2.0 降到 0.8：评测端 cmd 不可控，tracking 仍需退居辅助，
# 但 0.5 对姿态/节奏约束偏弱，容易放大只求冲距离的退化策略。
# Raised slightly from 0.5 to 0.8 to recover motion discipline without bringing
# back the cmd=0 standing attractor.
weight = 0.8
[rewards.track_lin_vel_xy.params]
# Std of Gaussian kernel, controls how sharp the error → reward decay is.
# 高斯核标准差，控制误差 → 奖励的衰减陡峭程度
std = 0.5
# Velocity command name.
# 速度命令名
command_name = "base_velocity"

[rewards.track_ang_vel_z]
# 权重从 1.0 降到 0.4：仍避免把策略拉向原地转圈 tracking，
# 但比 0.25 更能约束下台阶和转向时的朝向稳定。
# Raised from 0.25 to 0.4 to recover heading stability, especially on downhill
# stairs, without reintroducing a spin-in-place attractor.
weight = 0.4
[rewards.track_ang_vel_z.params]
std = 0.25
command_name = "base_velocity"

# --- Positive: dense forward-velocity bonus (gait shaping only) ---
# --- 正向：前向速度密集奖励（步态 shaping，不再是主前进信号）---
# 权重从 2.0 降回 1.0：本项基于 `root_lin_vel_b[:, 0]`（机体系前向速度），无法
# 区分"真前进"和"原地转圈跑步"——上一版评测中 `倒斜坡/倒台阶`（凹地形，spawn
# 在最低点）的 agent 学到"在 spawn 的平地圈圈跑刷 forward_velocity，永远不上坡"
# 就是这一项过强 + 不会区分世界位移导致的。本项现在仅作"步态前向"的辅助 shaping，
# 真正的前进奖励让位给 `progress`（基于世界系到 spawn 的位移，转圈时为 0）。
# Down-weighted: this body-frame signal cannot distinguish "advance" from
# "circle-running at spawn"; the new `progress` term carries the main load.
[rewards.forward_velocity]
weight = 1.0
[rewards.forward_velocity.params]
command_name = "base_velocity"
max_speed = 1.0
cmd_threshold = 0.05
unconditional = true

# --- Positive: world-frame progress away from spawn (eval-aligned) ---
# --- 正向：远离出生点的世界系距离增量（与评测目标对齐的核心信号）---
# 评测 standard 模式按 `||pos_current - pos_spawn||` 计分，本项就是该指标的密集
# 单步差分。直接对治"凹地形（pyramid_*_inv）spawn 周围转圈跑步不上坡"——原地
# 画圈、来回往返都拿不到分，只有"持续远离 spawn"才被奖励。
# 权重 15：仍直接镜像评测中的 spawn 距离目标，但不再让单步 progress
# 盖过姿态、落地缓冲和能耗项；优先修正当前"猛冲拿时间、姿态/能耗崩"的问题。
# Reduced from 50 to 15 so true progress stays primary without overwhelming
# posture, descent control, and efficiency terms.
[rewards.progress]
weight = 15.0

# --- Negative: base stability ---
# --- 负向：基座稳定 ---
# 参考 NP3O：换成 *_up gated 版本，仅在直立时惩罚；
# 上坡(pyramid_*_inv) 时机身天然 pitch 大，原本无门控的 lin_vel_z / ang_vel_xy /
# flat_orientation 会大幅累积负奖励，导致 agent 学到“在斜坡上挂机不动”的退化策略。
# Replace ungated penalties with NP3O-style `*_up` rewards that gate by upright
# posture, so uphill terrains do not over-penalize and stall learning.
[rewards.lin_vel_z_up]
# Vertical linear velocity penalty, gated by upright posture.
# 回调到 -0.6：继续给楼梯抬腿留空间，但明显加强下台阶/下坡时的竖直速度约束，
# 直接压制当前录像里"砸下去"的失败模式。
# Raised from -0.3 to -0.6 to reduce hard landings on downhill stairs while still
# leaving enough room for upward stepping motion.
weight = -0.6

[rewards.ang_vel_xy_up]
# Pitch/roll angular velocity penalty, gated by upright posture.
# X/Y 方向角速度惩罚（直立门控版）
weight = -0.05

# --- Removed: upward (was free standing reward) ---
# --- 已移除：upward 是"站着不动也拿满分"的元凶 ---
# `1 - projected_gravity_z` 在直立时恒等于 ~2，权重 0.5 → +1.0/step 恒定免费奖励。
# 上轮评估 `前进 8.4 / 时间 0 / 能耗 93.76` 的根因正是它：standing 拿到的正向
# reward (≈ tracking@cmd=0 + upward) 比实际走（tracking + 各种惩罚）还高。
# 完整对齐 NP3O 需要配合 `has_contact` / `stand_nice` / `base_height_up=-10` 等多项
# 才能让 upward 不被当作免费午餐；本仓库尚未补齐，因此先关闭。
# 如要重新启用，需要先验证 `forward_velocity` 已稳定为主信号，再按 NP3O 比例引入。
# DISABLED: upward acts as a free reward for standing in our current setup.
# [rewards.upward]
# weight = 0.5

# --- Negative: joint smoothness ---
# --- 负向：关节 ---
[rewards.joint_acc]
# Joint acceleration penalty.
# 关节加速度惩罚
weight = -2.5e-7

[rewards.joint_torques]
# Joint torque penalty.
# 关节扭矩惩罚
weight = -1e-4

[rewards.dof_pos_limits]
# Penalty when joints approach position limits.
# 接近关节位置极限时的惩罚
weight = -2.0

# --- Negative: action smoothness ---
# --- 负向：动作平滑 ---
[rewards.action_rate]
# Delta between consecutive actions (1st order).
# 相邻动作差（一阶）
weight = -0.01

# --- Negative: undesired contacts ---
# --- 负向：碰撞 ---
[rewards.undesired_contacts]
weight = -1.0
[rewards.undesired_contacts.params]
# Max allowed contacts before penalty kicks in.
# 触发阈值：被罚前允许的最大接触数
threshold = 1

# --- Extra: anti-tipping (NP3O orientation_up 版本，斜坡门控) ---
# --- 额外：防倾倒（NP3O orientation_up 版本，斜坡上自动放宽）---
# NP3O 中 orientation_up 仅 -0.2；此前用 -1.0 是 5 倍过重，导致斜坡上 pose 持续下降
# （agent 被迫学到"贴坡爬"等扭曲姿态去逃避 pitch 惩罚）。下调到 NP3O 同尺度。
# NP3O uses orientation_up=-0.2; the previous -1.0 was 5x too strict and was the
# root cause of the late-stage pose-score regression seen in training.
[rewards.orientation_up]
weight = -0.2

# --- Gait: long stride to suppress mincing steps ---
# --- 步态：奖励长步幅，抑制小碎步 ---
# 权重从 0.5 降到 0.25：原值过强导致 agent 拼命踢腿换大跨步，能耗显著上升、
# energy_score 持续下降。0.25 仍能保留正向激励，又不至于把 tracking 信号挤掉。
# Reduced from 0.5 to 0.25: too strong a stride bonus drives the agent to pump
# torque and tanks the energy_score; 0.25 still encourages stride length safely.
[rewards.feet_air_time]
weight = 0.25
[rewards.feet_air_time.params]
command_name = "base_velocity"
threshold = 0.5

# --- Gait: keep hips close to default ---
# --- 步态：髋关节回中（抑制外八/碎步）---
# 修复：原实现把硬编码索引 [0,3,6,9] 当成 hip，但 IsaacLab Go2 关节是按
# "类型分组、字母排序"（hip 索引应是 [0,1,2,3]），实际上之前在罚 [FL_hip,
# RR_hip, FL_thigh, RR_thigh] —— 既漏一半 hip，又把 thigh 当 hip 罚，
# 极可能就是"右后腿姿态怪 / 小碎步"训练不掉的元凶。
# 现在改为按 joint name 解析索引；权重适度恢复到 NP3O 量级 (-0.05)。
# Bug fix: previous hardcoded indices were wrong for IsaacLab joint order;
# joints are now resolved from joint_names (see reward_process.py).
[rewards.hip_to_default]
weight = -0.05

# --- Gait: diagonal-leg mirror symmetry (NP3O foot_mirror_up) ---
# --- 步态：对角腿镜像（直接对治"右后腿悬空 / 步态不对称"）---
# NP3O 中 `foot_mirror_up = -0.05`：FL≈RR、FR≈RL 的关节对称约束，trot 步态下
# 是对角腿同相位的物理体现。这是当前评测中"右后腿长期悬空、其它腿小碎步"
# 缺失的关键 shaping 信号。直立门控保留，倒地后不继续累罚。
# Critical missing piece for the asymmetric-gait failure mode observed in eval.
[rewards.foot_mirror_up]
weight = -0.05

# --- Gait: anti-air (require >=2 feet contact when moving) ---
# --- 步态：反离地（移动中至少 2 足触地）---
# 直接 cap 掉"3 腿离地、1 腿支撑"或"右后腿干脆不参与"的极端步态。
# 移动门控避免与跳跃/起步阶段冲突。
# Anti-air constraint to clamp the "floating leg" failure observed in eval.
[rewards.no_fly]
weight = -0.5
[rewards.no_fly.params]
command_threshold = 0.1

# --- Idle rewards 已禁用 ---
# --- DISABLED: idle rewards 在评测 cmd 不可控的情境下是"鼓励挂机"的元凶 ---
# 原 has_contact (+0.5) + stand_nice (-0.1) 在 cmd≈0 时会发出"站着满分"的信号，
# 评测端一旦把 cmd 采到接近零，这两项立刻把策略拉回站立。哪怕 reward_process 里
# 已经把 idle 判定加上 ang_vel 门控，但只要 lin_vel_x cmd=0 + yaw cmd=0 这种组合
# 出现，策略仍会被诱导挂机。此次直接关闭，强制只剩"前进/姿态"两类信号。
# Disabled because they form a "stand still" attractor whenever the eval cmd
# happens to land near zero — exactly the failure observed in evaluation.
# 如确认评测端 cmd 始终非零，可重新启用并适度调小权重。
# [rewards.has_contact]
# weight = 0.5
# [rewards.has_contact.params]
# command_threshold = 0.1

# [rewards.stand_nice]
# weight = -0.1
# [rewards.stand_nice.params]
# command_threshold = 0.1

# --- Gait: foot-clearance during swing (key for stairs) ---
# --- 步态：摆动腿抬脚高度（楼梯关键奖励）---
# 直接面向 pyramid_stairs / pyramid_stairs_inv 性能差的根因：当前 agent 贴地碎步走，
# 一遇到台阶就被绊。`feet_height_body` 给摆动腿设定 body-frame z 目标（-0.30 m，
# 越接近 0 抬腿越高），是 NP3O foot_clearance_up + Isaac Lab feet_height_body 的等价物。
# Critical for stairs: enforces a body-frame z target for the swing foot so the
# agent learns to actually lift its legs over step edges.
[rewards.feet_height_body]
# 权重恢复到 -0.05（NP3O 量级）：此前 -0.02 是为了避免早期"不抬腿不走"，但现在
# forward_velocity 已无条件且权重 2.0，前进信号足够强；楼梯 L4 上不去的根因之一
# 就是抬腿不够，必须把 swing-foot 高度信号恢复到位。
# Restored to -0.05 (NP3O scale): forward_velocity now dominates, so this can
# safely return to its full strength to actually fix the stairs failure mode.
weight = -0.05
[rewards.feet_height_body.params]
command_name = "base_velocity"
target_height = -0.30
tanh_mult = 2.0

# --- Posture: keep base height (avoid duck-walking) ---
# --- 姿态：维持基座高度，抑制"鸭步/趴地"---
# pose_score 后期下降的另一推手是机身整体下沉；NP3O base_height_target = 0.32。
# Mirrors NP3O `base_height_up`; prevents the duck-walking failure mode where the
# robot collapses its hips to bypass `feet_height_body`.
[rewards.correct_base_height]
# 权重从 -0.5 降到 -0.2：上坡 / 楼梯地形上 root_z 天然偏离 target，过强惩罚会
# 鼓励"原地保持高度不前进"。NP3O 在 base_height_up=-10 同时配合很多约束才稳定，
# 我们尚未补齐，先弱化避免压制前进。
# Reduced from -0.5 to -0.2 to avoid penalizing natural height changes on slopes.
weight = -0.2
[rewards.correct_base_height.params]
target_height = 0.32

# --- Energy / smoothness: cap power consumption ---
# --- 能耗 / 平滑：限制功率消耗，避免 energy_score 持续下降 ---
# `feet_air_time` 让 agent 倾向"使劲踢"，必须配合 energy / torque / smoothness
# 类反馈才能学到"踢得对而非踢得猛"。这三项是基类内置 reward。
# Couples with feet_air_time to shape "kick smart, not kick hard": addresses the
# energy_score regression directly.
[rewards.energy]
weight = -2e-5

[rewards.action_smoothness]
weight = -0.005

[rewards.feet_contact_forces]
weight = -1.5e-4

# --- Termination: explicit fall penalty ---
# --- 终止惩罚：明确"摔了就疼"---
# 当前配置摔倒只是早结束，没有显式负奖励，agent 学不到"避免摔倒"的偏好；
# 加一个 termination 罚分让早期学习有方向。
# Without a termination penalty, the agent has no explicit signal to avoid
# falls, which compounds the "stand still on hard terrain" failure mode.
[rewards.termination]
weight = -1.0

[rewards.reach_goal]
# Reach-goal reward example (active only when env.goal_positions is maintained, i.e. track terrain).
# 到达目标奖励示例（仅在 track 地形下 env.goal_positions 被维护时生效）。
weight = 10.0
[rewards.reach_goal.params]
threshold = 0.6

