# =============================================================================
# Standard Locomotion: locomotion training on a standard grid of mixed sub-terrains.
# Standard Locomotion: 标准地形运动训练（多种子地形按比例混合）
#
# Based on  Stage1 + extra terms (termination / flat_orientation / feet_stumble).
# 基于 Stage1 + 额外项（termination / flat_orientation / feet_stumble）
# =============================================================================

# === Basic Configuration ===
# === 基础配置 ===
[env]
# Number of parallel environments, valid range: [1, 4096].
# 并行环境数量，合法范围：[1, 4096]
num_envs = 2048

# Max episode duration (seconds).
# 最大 episode 时长（秒）
episode_length_s = 25

[env_conf]
# Random seed.
# 随机种子
seed = 0


# === Terrain Configuration ===
# === 地形配置 ===
[terrain]
# Terrain mode, valid values: "standard" | "track".
# 地形模式，合法值："standard" | "track"
mode = "standard"

# In standard mode, num_rows = number of difficulty tiers (curriculum levels along X),
# valid range [1, 10], recommended 10.
# standard 模式下 num_rows 表示**难度级别数**（沿 X 轴的课程档位），合法范围：[1, 10]，推荐 10
num_rows = 10

# In standard mode, num_cols = parallel plots within the same difficulty tier along Y,
# valid range [1, 40], recommended 20.
# Note: in standard mode num_cols is NOT a difficulty tier, just parallel plots for env distribution.
# standard 模式下 num_cols 表示**同一难度下的并行地块数**（沿 Y 轴），合法范围：[1, 40]，推荐 20
# 注意：standard 模式下 num_cols 不是难度档，而是用于分散大量 env 到不同地块的并行数
num_cols = 20

# Difficulty range [min, max], valid range: [0.0, 1.0].
# 难度范围 [min, max]，合法范围：[0.0, 1.0]
difficulty_range = [0.0, 1.0]

# Whether to enable terrain curriculum (promote/demote difficulty by performance).
# 是否启用地形课程学习（按表现晋级/降级难度）
curriculum = true

# Max init difficulty tier for robot placement, valid range: [0, 9].
# 机器人初始放置的最大难度档，合法范围：[0, 9]
# 课程从 0 档起步：网络早期根本没学会走路，把它直接丢到难度 5（含 stairs / maze）
# 会让前几百次 episode 全部摔死，外现就是 "开局挂机"。NP3O 默认从 0 起步，curriculum
# 会按完成度自动晋级，难度学习曲线更平滑。
# Start the curriculum at tier 0; jumping straight to tier 5 with stairs/maze
# stalls early training (the well-known "stand still" warmup symptom).
max_init_terrain_level = 0


# Sub-terrain proportions (all proportions must sum to 1.0).
# Allowed sub-terrains: pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
# 子地形比例（所有 proportion 之和必须 = 1.0）
# 合法子地形：pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
[terrain.standard.pyramid_slope]
proportion = 0.15

[terrain.standard.pyramid_slope_inv]
proportion = 0.2

[terrain.standard.pyramid_stairs]
proportion = 0.25

[terrain.standard.pyramid_stairs_inv]
proportion = 0.3

[terrain.standard.maze]
proportion = 0.1


# === Domain Randomization ===
# === 域随机化 ===
[domain_rand]
# Master switch for domain randomization.
# 域随机化总开关
enable_domain_rand = true

# Whether to randomize ground friction.
# 是否随机化地面摩擦系数
randomize_friction = true

# Friction range [min, max], must be >= 0.
# 摩擦系数采样范围 [min, max]，必须 >= 0
friction_range = [0.3, 1.5]

# Whether to periodically push the robot.
# 是否周期性对机器人施加外部推力
push_robots = true

# Push interval (seconds), must be > 0.
# 推力间隔（秒），必须 > 0
push_interval_s = 15

# Max push velocity in XY plane (m/s), must be >= 0.
# XY 平面最大推力速度 (m/s)，必须 >= 0
max_push_vel_xy = 0.5


# === Observation Noise ===
# === 观测噪声 ===
[noise]
# Whether to add noise to observations.
# 是否在观测中加入噪声
add_noise = true


# === Initial State ===
# === 初始状态 ===
[init_state]
# Robot initial position [x, y, z] (m); z valid range [0.30, 0.60]m, recommended 0.35m.
# 机器人初始位置 [x, y, z] (m)；z 合法范围：[0.30, 0.60]m，推荐 0.35m
pos = [0.0, 0.0, 0.35]


# === Velocity Commands ===
# === 速度命令 ===
[commands]
# Velocity command resampling interval [min, max] (seconds).
# 速度命令重采样区间 [min, max]（秒）
resampling_time = [10.0, 10.0]

[commands.limit]
# Velocity command **hard limits** (curriculum may expand sampling range up to here).
# 速度命令 **采样上限**（硬约束，curriculum 最多扩展到该范围）
# 参考 NP3O Go2ConstraintHimRoughCfg.commands.ranges：上限收敛到 ~1m/s，
# 避免 curriculum 把目标速度推到 2m/s 让机器人完全跟不上、tracking 长期 ≈ 0。
# Reference NP3O: clamp the hard upper bound around 1 m/s so the curriculum
# does not drift to unreachable targets that drown the tracking signal.
lin_vel_x = [-1.0, 1.0]
lin_vel_y = [-0.6, 0.6]
ang_vel_z = [-1.0, 1.0]

[commands.ranges]
# Velocity command **initial sampling ranges** (expand towards limit when curriculum is enabled).
# 速度命令 **初始采样范围**（curriculum 开启时会动态扩大到 limit）

# Start with forward-only to prevent reversing that triggers stair-curriculum demotions;
# curriculum will expand towards limit.
# 初始只前进，避免后退导致楼梯频繁降级；curriculum 会扩展到 limit
lin_vel_x = [0.0, 0.5]
lin_vel_y = [-0.3, 0.3]
ang_vel_yaw = [-1.0, 1.0]


# =====================================================================
# Reward Configuration
# 奖励配置
#
# Each reward term must have a numeric `weight`; parameterized rewards use [rewards.<name>.params].
# 每个奖励项必须包含数值型 weight；带参数的奖励用 [rewards.<name>.params] 配置
# =====================================================================

# --- Positive: velocity tracking ---
# --- 正向：速度跟踪 ---
# NP3O Go2ConstraintHimRoughCfg 中 tracking_lin_vel = 2.0、tracking_ang_vel = 1.0；
# 当前训练 forward 分提升缓慢，是因为主信号被其他 penalty 淹没，提权到接近 NP3O 比例。
# Bring tracking weights closer to NP3O ratios so the velocity-tracking signal
# dominates instead of being drowned by penalty terms.
[rewards.track_lin_vel_xy]
weight = 1.5
[rewards.track_lin_vel_xy.params]
# Std of Gaussian kernel, controls how sharp the error → reward decay is.
# 高斯核标准差，控制误差 → 奖励的衰减陡峭程度
std = 0.25
# Velocity command name.
# 速度命令名
command_name = "base_velocity"

[rewards.track_ang_vel_z]
weight = 0.75
[rewards.track_ang_vel_z.params]
std = 0.25
command_name = "base_velocity"

# --- Negative: base stability ---
# --- 负向：基座稳定 ---
# 参考 NP3O：换成 *_up gated 版本，仅在直立时惩罚；
# 上坡(pyramid_*_inv) 时机身天然 pitch 大，原本无门控的 lin_vel_z / ang_vel_xy /
# flat_orientation 会大幅累积负奖励，导致 agent 学到“在斜坡上挂机不动”的退化策略。
# Replace ungated penalties with NP3O-style `*_up` rewards that gate by upright
# posture, so uphill terrains do not over-penalize and stall learning.
[rewards.lin_vel_z_up]
# Vertical linear velocity penalty, gated by upright posture.
# Z 方向线速度惩罚（直立门控版）
weight = -2.0

[rewards.ang_vel_xy_up]
# Pitch/roll angular velocity penalty, gated by upright posture.
# X/Y 方向角速度惩罚（直立门控版）
weight = -0.05

# --- Positive: incentivize uphill / 上坡正向激励 ---
# 直接修复“pyramid_slope_inv / pyramid_stairs_inv 学不上去”的问题：
# `1 - projected_gravity_z` 在机身仰起时 > 0，给上坡 / 上楼梯一个明确的正激励。
# Directly addresses poor performance on inv terrains: rewards the agent for
# tilting upright into a slope/stair rather than refusing to climb.
[rewards.upward]
weight = 0.5

# --- Negative: joint smoothness ---
# --- 负向：关节 ---
[rewards.joint_acc]
# Joint acceleration penalty.
# 关节加速度惩罚
weight = -2.5e-7

[rewards.joint_torques]
# Joint torque penalty.
# 关节扭矩惩罚
weight = -1e-4

[rewards.dof_pos_limits]
# Penalty when joints approach position limits.
# 接近关节位置极限时的惩罚
weight = -2.0

# --- Negative: action smoothness ---
# --- 负向：动作平滑 ---
[rewards.action_rate]
# Delta between consecutive actions (1st order).
# 相邻动作差（一阶）
weight = -0.01

# --- Negative: undesired contacts ---
# --- 负向：碰撞 ---
[rewards.undesired_contacts]
weight = -1.0
[rewards.undesired_contacts.params]
# Max allowed contacts before penalty kicks in.
# 触发阈值：被罚前允许的最大接触数
threshold = 1

# --- Extra: anti-tipping (NP3O orientation_up 版本，斜坡门控) ---
# --- 额外：防倾倒（NP3O orientation_up 版本，斜坡上自动放宽）---
# NP3O 中 orientation_up 仅 -0.2；此前用 -1.0 是 5 倍过重，导致斜坡上 pose 持续下降
# （agent 被迫学到"贴坡爬"等扭曲姿态去逃避 pitch 惩罚）。下调到 NP3O 同尺度。
# NP3O uses orientation_up=-0.2; the previous -1.0 was 5x too strict and was the
# root cause of the late-stage pose-score regression seen in training.
[rewards.orientation_up]
weight = -0.2

# --- Gait: long stride to suppress mincing steps ---
# --- 步态：奖励长步幅，抑制小碎步 ---
# 权重从 0.5 降到 0.25：原值过强导致 agent 拼命踢腿换大跨步，能耗显著上升、
# energy_score 持续下降。0.25 仍能保留正向激励，又不至于把 tracking 信号挤掉。
# Reduced from 0.5 to 0.25: too strong a stride bonus drives the agent to pump
# torque and tanks the energy_score; 0.25 still encourages stride length safely.
[rewards.feet_air_time]
weight = 0.25
[rewards.feet_air_time.params]
command_name = "base_velocity"
threshold = 0.5

# --- Gait: keep hips close to default ---
# --- 步态：髋关节回中（抑制外八/碎步）---
# 权重从 -0.05 降到 -0.02：避免早期初始化时把 hip 锁住、影响探索导致开局挂机。
# Soften hip-default constraint so it does not stifle exploration in early training.
[rewards.hip_to_default]
weight = -0.02

# --- Gait: foot-clearance during swing (key for stairs) ---
# --- 步态：摆动腿抬脚高度（楼梯关键奖励）---
# 直接面向 pyramid_stairs / pyramid_stairs_inv 性能差的根因：当前 agent 贴地碎步走，
# 一遇到台阶就被绊。`feet_height_body` 给摆动腿设定 body-frame z 目标（-0.30 m，
# 越接近 0 抬腿越高），是 NP3O foot_clearance_up + Isaac Lab feet_height_body 的等价物。
# Critical for stairs: enforces a body-frame z target for the swing foot so the
# agent learns to actually lift its legs over step edges.
[rewards.feet_height_body]
weight = -0.05
[rewards.feet_height_body.params]
command_name = "base_velocity"
target_height = -0.30
tanh_mult = 2.0

# --- Posture: keep base height (avoid duck-walking) ---
# --- 姿态：维持基座高度，抑制"鸭步/趴地"---
# pose_score 后期下降的另一推手是机身整体下沉；NP3O base_height_target = 0.32。
# Mirrors NP3O `base_height_up`; prevents the duck-walking failure mode where the
# robot collapses its hips to bypass `feet_height_body`.
[rewards.correct_base_height]
weight = -0.5
[rewards.correct_base_height.params]
target_height = 0.32

# --- Energy / smoothness: cap power consumption ---
# --- 能耗 / 平滑：限制功率消耗，避免 energy_score 持续下降 ---
# `feet_air_time` 让 agent 倾向"使劲踢"，必须配合 energy / torque / smoothness
# 类反馈才能学到"踢得对而非踢得猛"。这三项是基类内置 reward。
# Couples with feet_air_time to shape "kick smart, not kick hard": addresses the
# energy_score regression directly.
[rewards.energy]
weight = -2e-5

[rewards.action_smoothness]
weight = -0.005

[rewards.feet_contact_forces]
weight = -1.5e-4

# --- Termination: explicit fall penalty ---
# --- 终止惩罚：明确"摔了就疼"---
# 当前配置摔倒只是早结束，没有显式负奖励，agent 学不到"避免摔倒"的偏好；
# 加一个 termination 罚分让早期学习有方向。
# Without a termination penalty, the agent has no explicit signal to avoid
# falls, which compounds the "stand still on hard terrain" failure mode.
[rewards.termination]
weight = -1.0

[rewards.reach_goal]
# Reach-goal reward example (active only when env.goal_positions is maintained, i.e. track terrain).
# 到达目标奖励示例（仅在 track 地形下 env.goal_positions 被维护时生效）。
weight = 10.0
[rewards.reach_goal.params]
threshold = 0.6

# TODO: you can add non-IsaacLab locomotion rewards such as energy /
# correct_base_height / feet_stumble as needed.
# After implementing the corresponding _reward_<name> method in
# agent_diy/feature/reward_process.py, you can activate it here.
# TODO：可按需补充 energy / correct_base_height / feet_stumble 等非 IsaacLab 运控奖励。
# 自行在 agent_diy/feature/reward_process.py 实现对应 _reward_<name> 方法后即可在此激活。
